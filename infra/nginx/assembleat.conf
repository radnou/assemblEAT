# =============================================
# AssemblEat — Nginx Reverse Proxy
# Proxies api.assembleat.app → supabase_platform_kong:8000
# Kong is reachable via the gerersci_internal Docker network.
# =============================================

# ---------------------------
# HTTP → HTTPS redirect
# ---------------------------
server {
    listen 80;
    server_name api.assembleat.app;

    # Allow Let's Encrypt ACME challenge (certbot webroot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------------------------
# HTTPS — Supabase API proxy
# ---------------------------
server {
    listen 443 ssl;
    http2 on;
    server_name api.assembleat.app;

    ssl_certificate     /etc/letsencrypt/live/assembleat.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/assembleat.app/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;

    # ---------------------------
    # Auth
    # ---------------------------
    location /auth/ {
        proxy_pass         http://supabase_platform_kong:8000/auth/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   apikey $http_apikey;
        proxy_set_header   Authorization $http_authorization;
    }

    # ---------------------------
    # REST
    # ---------------------------
    location /rest/ {
        proxy_pass         http://supabase_platform_kong:8000/rest/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   apikey $http_apikey;
        proxy_set_header   Authorization $http_authorization;
    }

    # ---------------------------
    # Realtime (WebSocket upgrade)
    # ---------------------------
    location /realtime/ {
        proxy_pass             http://supabase_platform_kong:8000/realtime/;
        proxy_http_version     1.1;
        proxy_set_header       Host $host;
        proxy_set_header       X-Real-IP $remote_addr;
        proxy_set_header       X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto $scheme;
        proxy_set_header       apikey $http_apikey;
        proxy_set_header       Authorization $http_authorization;
        # WebSocket upgrade
        proxy_set_header       Upgrade $http_upgrade;
        proxy_set_header       Connection "upgrade";
        proxy_read_timeout     3600s;
        proxy_send_timeout     3600s;
    }

    # ---------------------------
    # Storage
    # ---------------------------
    location /storage/ {
        proxy_pass         http://supabase_platform_kong:8000/storage/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   apikey $http_apikey;
        proxy_set_header   Authorization $http_authorization;
        client_max_body_size 50M;
    }
}
