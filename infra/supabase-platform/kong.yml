_format_version: "3.0"
_transform: true

# =============================================
# AssemblEat — Kong Declarative Configuration
# Routes all Supabase API traffic to internal services.
# Kong listens on port 8000 (reached via nginx proxy).
# =============================================

consumers:
  - username: anon
    keyauth_credentials:
      - key: ${SUPABASE_ANON_KEY}

  - username: service_role
    keyauth_credentials:
      - key: ${SUPABASE_SERVICE_KEY}

acls:
  - consumer: anon
    group: anon
  - consumer: service_role
    group: admin

services:
  # ---------------------------
  # Auth — GoTrue
  # ---------------------------
  - name: auth-v1
    url: http://auth:9999/
    plugins:
      - name: cors
    routes:
      - name: auth-v1-all
        strip_path: true
        paths:
          - /auth/v1/

  # ---------------------------
  # REST — PostgREST
  # ---------------------------
  - name: rest-v1
    url: http://rest:3000/
    routes:
      - name: rest-v1-all
        strip_path: true
        paths:
          - /rest/v1/
    plugins:
      - name: cors
      - name: key-auth
        config:
          hide_credentials: false
      - name: acl
        config:
          hide_groups_header: true
          allow:
            - anon
            - admin

  # ---------------------------
  # Realtime — Supabase Realtime
  # ---------------------------
  - name: realtime-v1
    url: http://realtime:4000/
    routes:
      - name: realtime-v1-all
        strip_path: true
        paths:
          - /realtime/v1/
    plugins:
      - name: cors
      - name: key-auth
        config:
          hide_credentials: false
      - name: acl
        config:
          hide_groups_header: true
          allow:
            - anon
            - admin

  # ---------------------------
  # Storage — Supabase Storage API
  # ---------------------------
  - name: storage-v1
    url: http://storage:5000/
    routes:
      - name: storage-v1-all
        strip_path: true
        paths:
          - /storage/v1/
    plugins:
      - name: cors
      - name: key-auth
        config:
          hide_credentials: false
      - name: acl
        config:
          hide_groups_header: true
          allow:
            - anon
            - admin
