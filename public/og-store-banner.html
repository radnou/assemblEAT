<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1600px; height: 300px; font-family: 'Inter', system-ui; background: linear-gradient(135deg, #2E4057 0%, #048A81 100%); display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
  body::before { content: ''; position: absolute; top: -80px; right: 100px; width: 300px; height: 300px; background: radial-gradient(circle, rgba(244,162,97,0.2) 0%, transparent 70%); border-radius: 50%; }
  body::after { content: ''; position: absolute; bottom: -60px; left: 200px; width: 200px; height: 200px; background: radial-gradient(circle, rgba(4,138,129,0.3) 0%, transparent 70%); border-radius: 50%; }
  .container { display: flex; align-items: center; gap: 40px; z-index: 1; }
  .emoji { font-size: 64px; }
  h1 { font-size: 42px; font-weight: 800; color: white; }
  h1 em { font-style: normal; color: #F4A261; }
  p { font-size: 18px; color: rgba(255,255,255,0.7); margin-top: 6px; }
</style>
</head>
<body>
  <div class="container">
    <span class="emoji">🥗</span>
    <div>
      <h1>AssemblEat — <em>Repas sans décision</em></h1>
      <p>Planifiez vos repas avec le Nutri-Score v2. Gratuit.</p>
    </div>
  </div>
</body>
</html>
